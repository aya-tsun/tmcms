databases:
  - name: tmcms-db
    plan: free

services:
  - type: web
    name: tmcms
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tmcms-db
          property: connectionString
